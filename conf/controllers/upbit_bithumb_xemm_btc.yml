# Upbit/Bithumb XEMM (BTC-KRW)
controller_type: generic
controller_name: upbit_bithumb_xemm_controller

# per-pair quote budget
# (buy/sell 각 50%로 분할)
total_amount_quote: "300000"

maker_connector: bithumb
maker_trading_pair: BTC-KRW
taker_connector: upbit
taker_trading_pair: BTC-KRW

# 소액 테스트용 (보수적 시작: 약 0.10%대)
buy_levels_targets_amount: "0.0010,1-0.0014,2-0.0020,3"
sell_levels_targets_amount: "0.0010,1-0.0014,2-0.0020,3"

min_profitability_delta: "0.0002"
max_profitability_delta: "0.006"

max_executors_per_side: 1
delay_between_creations: 2

# maker(빗썸)-taker(업비트) 베이스 불균형 허용치
inventory_target_base: "0"
max_inventory_skew_base: "0.02"

# taker는 기본 LIMIT (슬리피지 보호)
taker_order_type: LIMIT
taker_slippage_buffer_bps: "8"
taker_order_max_age_seconds: 4
taker_max_retries: 3
taker_fallback_to_market: false
